<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RNG²DLE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@200;700&display=swap" rel="stylesheet">

<style>
  @font-face {
    font-family: 'AzeretGrid';
    src: url('./fonts/AzeretMono-ExtraBold.woff2') format('woff2');
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg: #141414;
    --panel: #1c1c1c;
    --panel-border: #3a3a3a;
    --cell-bg: #262626;
    --cell-border: #3f3f3f;
    --text-hi: #e8e8e8;
    --text-dim: #9a9a9a;
    --btn-bg: #4a4a4a;
    --btn-bg-hover: #5a5a5a;
    --accent-blue: #1d4ed8;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text-hi);
    height: 100%;
    font-family: 'Azeret Mono', monospace;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    padding: 0 32px;
    border-bottom: 1px solid #262626;
  }

  header .logo {
    font-family: 'Azeret Mono', monospace;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: var(--text-hi);
  }

  .mode-switch {
    display: flex;
    background: #222;
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--panel-border);
    gap: 4px;
  }

  .mode-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Azeret Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .mode-btn.active {
    background: var(--btn-bg);
    color: var(--text-hi);
  }

  main {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 72px;
    flex-wrap: nowrap;
    min-height: calc(100vh - 64px);
    padding: 40px 24px;
  }

  .grid-panel {
    --panel-padding: 18px;
    --grid-gap: 6px;
    --grid-size: 300px;
    --cell-font: clamp(24px, 6.5vw, 42px);
    --panel-radius: 20px;

    position: relative;
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: var(--panel-radius);
    padding: var(--panel-padding);
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    width: calc(var(--grid-size) + var(--panel-padding) * 2);
    flex-shrink: 0;
    transition: all 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .grid-panel.expanded {
    --panel-padding: 25px;
    --grid-gap: 8px;
    --grid-size: 420px;
    --cell-font: clamp(34px, 9.1vw, 58px);
    --panel-radius: 28px;
  }

  .row-indicator {
    position: absolute;
    width: 32px;
    height: 32px;
    left: 0;
    top: 0;
    opacity: 0;
    transform: translate(0, 0) rotate(0deg);
    transition: opacity 0.4s ease, transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    pointer-events: none;
    z-index: 10;
  }

  .row-indicator.visible { opacity: 1; }
  .row-indicator svg {
    width: 100%;
    height: 100%;
    display: block;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: var(--grid-gap);
    width: var(--grid-size);
    aspect-ratio: 1 / 1;
    transition: gap 0.55s cubic-bezier(0.22, 1, 0.36, 1), width 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .cell {
    position: relative;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'AzeretGrid', 'Azeret Mono', monospace;
    font-weight: 800;
    font-size: var(--cell-font);
    color: var(--text-hi);
    user-select: none;
    line-height: 1;
    border-radius: 10px;
    transition: font-size 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .cell input {
    width: 100%;
    height: 100%;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid var(--cell-border);
    border-radius: inherit;
    color: var(--text-hi);
    font-family: inherit;
    font-weight: inherit;
    font-size: inherit;
    text-align: center;
    outline: none;
    transition: border-color 0.2s ease, background 0.2s ease;
  }

  .cell input:focus {
    border-color: #3b82f6;
    background: rgba(59, 130, 246, 0.15);
  }

  .cell::before {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(30, 58, 138, 0.85);
    border: 2px solid rgba(59, 130, 246, 0.8);
    border-radius: inherit;
    opacity: 0;
    transform: scale(0.9);
    pointer-events: none;
    z-index: 2;
    transition: opacity 1.5s cubic-bezier(0.1, 0.9, 0.2, 1), transform 1.5s cubic-bezier(0.1, 0.9, 0.2, 1);
  }

  .cell.badge-trigger::before {
    opacity: 1;
    transform: scale(1);
    transition: opacity 0.05s ease-out, transform 0.05s ease-out;
  }

  .info {
    width: 420px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    flex-shrink: 0;
  }

  .default-state {
    display: flex;
    flex-direction: column;
    gap: 14px;
    opacity: 1;
    transform: translateX(0);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .default-state h1 {
    font-family: 'Azeret Mono', monospace;
    font-weight: 700;
    font-size: clamp(38px, 6vw, 64px);
    margin: 0;
    line-height: 1;
    letter-spacing: 0.01em;
  }

  .default-state.fade-out-right {
    opacity: 0;
    transform: translateX(40px);
    pointer-events: none;
  }

  .default-state.hidden { display: none; }

  .info p.tagline {
    font-family: 'Azeret Mono', monospace;
    font-weight: 200;
    font-size: 17px;
    color: var(--text-dim);
    margin: 0;
    line-height: 1.5;
  }

  .btn-group {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .action-btn {
    font-family: 'Azeret Mono', monospace;
    font-weight: 200;
    font-size: 18px;
    letter-spacing: 0.04em;
    color: var(--text-hi);
    background: var(--btn-bg);
    border: none;
    border-radius: 14px;
    padding: 14px 28px;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.05s ease;
  }

  .action-btn:hover { background: var(--btn-bg-hover); }
  .action-btn:active { transform: scale(0.98); }
  .action-btn.secondary {
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
  }
  .action-btn.secondary:hover {
    background: #222;
    color: var(--text-hi);
  }

  .result {
    display: none;
    flex-direction: column;
    gap: 6px;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .result.visible {
    display: flex;
    opacity: 1;
    transform: translateY(0);
  }

  .ep-score {
    font-family: 'Azeret Mono', monospace;
    font-weight: 700;
    font-size: clamp(42px, 7vw, 80px);
    line-height: 1;
    margin: 0;
    color: var(--text-hi);
  }

  .ep-score .unit {
    font-size: 0.4em;
    font-weight: 700;
    margin-left: 6px;
  }

  .badge-count {
    font-family: 'Azeret Mono', monospace;
    font-weight: 400;
    font-size: 18px;
    color: var(--text-dim);
    margin: 0 0 8px 0;
  }

  .badge-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 260px;
    overflow-y: auto;
    scrollbar-width: thin;
  }

  .badge-cards:empty { display: none; }

  .badge-card {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--panel);
    border: 1px solid var(--card-color, var(--panel-border));
    border-radius: 12px;
    padding: 10px 14px;
    opacity: 0;
    transform: translateY(-10px) scale(0.96);
    animation: badgeCardIn 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes badgeCardIn {
    0% { opacity: 0; transform: translateY(-10px) scale(0.96); }
    55% { opacity: 1; transform: translateY(1px) scale(1.02); box-shadow: 0 0 18px var(--card-glow, transparent); }
    100% { opacity: 1; transform: translateY(0) scale(1); box-shadow: 0 6px 16px rgba(0,0,0,0.3); }
  }

  .badge-card .badge-emoji { font-size: 24px; line-height: 1; flex-shrink: 0; }
  .badge-card .badge-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .badge-card .badge-label { font-family: 'Azeret Mono', monospace; font-weight: 700; font-size: 14px; color: var(--text-hi); }
  .badge-card .badge-meta { font-family: 'Azeret Mono', monospace; font-weight: 300; font-size: 11px; letter-spacing: 0.03em; text-transform: uppercase; color: var(--card-color, var(--text-dim)); }
  .badge-card .badge-ep { margin-left: auto; font-family: 'Azeret Mono', monospace; font-weight: 700; font-size: 13px; color: var(--text-hi); flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="logo">RNG²DLE</div>
  <div class="mode-switch">
    <button class="mode-btn active" id="modeHourlyBtn">Hourly</button>
    <button class="mode-btn" id="modeSandboxBtn">Sandbox</button>
  </div>
</header>

<main>
  <div class="grid-panel" id="gridPanel">
    <div class="row-indicator" id="rowIndicator">
      <svg viewBox="0 0 100 100">
        <path d="M 25,15 L 78,43 C 85,47 85,53 78,57 L 25,85 C 18,89 12,85 12,77 L 12,23 C 12,15 18,11 25,15 Z" 
              fill="#1e3a8a" stroke="#8b9bb4" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="info">
    <div class="default-state" id="defaultState">
      <h1 id="modeTitle">HOURLY</h1>
      <p class="tagline" id="modeTagline">One roll per hour. One grid.<br>What will yours be?</p>
      <div class="btn-group" id="hourlyControls">
        <button class="action-btn" id="generateBtn">GENERATE</button>
      </div>
      <div class="btn-group" id="sandboxControls" style="display: none;">
        <button class="action-btn secondary" id="fillRandomBtn">RANDOM</button>
        <button class="action-btn" id="calculateBtn">CALCULATE</button>
      </div>
    </div>

    <div class="result" id="result">
      <p class="ep-score" id="epScore">0<span class="unit">EP</span></p>
      <p class="badge-count" id="badgeCount">0 Badges Earned</p>
      <div class="badge-cards" id="badgeCards"></div>
      <div class="btn-group" id="resultControls" style="margin-top: 16px;">
        <button class="action-btn secondary" id="resetBtn">EDIT GRID</button>
      </div>
    </div>
  </div>
</main>

<script>
  const grid = document.getElementById('grid');
  const gridPanel = document.getElementById('gridPanel');
  const rowIndicator = document.getElementById('rowIndicator');
  const badgeCardsEl = document.getElementById('badgeCards');
  
  const modeHourlyBtn = document.getElementById('modeHourlyBtn');
  const modeSandboxBtn = document.getElementById('modeSandboxBtn');
  const hourlyControls = document.getElementById('hourlyControls');
  const sandboxControls = document.getElementById('sandboxControls');
  const modeTitle = document.getElementById('modeTitle');
  const modeTagline = document.getElementById('modeTagline');

  const cells = [];
  let currentMode = 'hourly';
  let rolled = false;
  let tickTimer = null;
  let detectionTimer = null;

  let currentEP = 0;
  let displayedEP = 0;
  let currentBadges = 0;
  let epAnimationframe = null;

  for (let i = 0; i < 36; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    grid.appendChild(cell);
    cells.push(cell);
  }

  function renderCellsForMode() {
    cells.forEach((cell, i) => {
      cell.innerHTML = '';
      if (currentMode === 'sandbox') {
        const input = document.createElement('input');
        input.type = 'text';
        input.maxLength = 1;
        input.value = Math.floor(Math.random() * 10);
        
        input.addEventListener('input', (e) => {
          const val = e.target.value;
          if (!/^[0-9]$/.test(val)) {
            e.target.value = '0';
          } else if (i < 35) {
            cells[i + 1].querySelector('input')?.focus();
          }
        });

        cell.appendChild(input);
      } else {
        cell.textContent = Math.floor(Math.random() * 10);
      }
    });
  }

  function getGridValues() {
    return cells.map(cell => {
      if (currentMode === 'sandbox') {
        const input = cell.querySelector('input');
        const parsed = parseInt(input ? input.value : '0', 10);
        return isNaN(parsed) ? 0 : parsed;
      } else {
        const parsed = parseInt(cell.textContent || '0', 10);
        return isNaN(parsed) ? 0 : parsed;
      }
    });
  }

  function randomizeGrid() {
    cells.forEach(cell => {
      const val = Math.floor(Math.random() * 10);
      if (currentMode === 'sandbox') {
        const input = cell.querySelector('input');
        if (input) input.value = val;
      } else {
        cell.textContent = val;
      }
    });
  }

  function startAmbientTicking() {
    if (tickTimer) clearInterval(tickTimer);
    tickTimer = setInterval(() => {
      if (!rolled && currentMode === 'hourly') randomizeGrid();
    }, 1000);
  }

  renderCellsForMode();
  startAmbientTicking();

  modeHourlyBtn.addEventListener('click', () => switchMode('hourly'));
  modeSandboxBtn.addEventListener('click', () => switchMode('sandbox'));

  function switchMode(mode) {
    if (currentMode === mode) return;
    currentMode = mode;
    
    modeHourlyBtn.classList.toggle('active', mode === 'hourly');
    modeSandboxBtn.classList.toggle('active', mode === 'sandbox');

    if (mode === 'hourly') {
      modeTitle.textContent = 'HOURLY';
      modeTagline.innerHTML = 'One roll per hour. One grid.<br>What will yours be?';
      hourlyControls.style.display = 'flex';
      sandboxControls.style.display = 'none';
    } else {
      modeTitle.textContent = 'SANDBOX';
      modeTagline.innerHTML = 'Craft your layout.<br>Test your highest potential score!';
      hourlyControls.style.display = 'none';
      sandboxControls.style.display = 'flex';
    }

    resetView();
  }

  function resetView() {
    rolled = false;
    if (detectionTimer) clearInterval(detectionTimer);
    rowIndicator.classList.remove('visible');
    gridPanel.classList.remove('expanded');
    
    defaultState.classList.remove('fade-out-right', 'hidden');
    result.classList.remove('visible');
    
    renderCellsForMode();
    startAmbientTicking();
  }

  document.getElementById('resetBtn').addEventListener('click', resetView);
  document.getElementById('fillRandomBtn')?.addEventListener('click', randomizeGrid);

  const RARITY_COLOR = {
    common: '#8a8a8a', uncommon: '#4ade80', rare: '#3b82f6',
    epic: '#a855f7', mythic: '#f59e0b', anomaly: '#ef4444'
  };

  function isPrime(n) {
    if (n < 2) return false;
    for (let i = 2; i * i <= n; i++) if (n % i === 0) return false;
    return true;
  }

  const BADGES = [
    { id: 'PRIME', label: 'Prime Number', emoji: '💎', family: null, score: 1274, rarity: 'uncommon', test: (d, s, n) => isPrime(n) },
    { id: 'PALINDROME', label: 'Palindrome', emoji: '🪞', family: null, score: 50025, rarity: 'rare', test: (d, s) => s === s.split('').reverse().join('') },
    { id: 'HEAVY', label: 'Heavy', emoji: '🧱', family: null, score: 33300, rarity: 'rare', test: (d) => d.reduce((a, b) => a + b, 0) > 45 },
    { id: 'FEATHER', label: 'Feather', emoji: '🪶', family: null, score: 2667, rarity: 'uncommon', test: (d) => d.reduce((a, b) => a + b, 0) < 15 },
    { id: 'VOID', label: 'Void', emoji: '🕳️', family: null, score: 167, rarity: 'common', test: (d) => !d.includes(0) },
    { id: 'NICE', label: 'Nice', emoji: '😏', family: 'NICE', score: 2024, rarity: 'uncommon', test: (d, s) => s.includes('69') },
    { id: 'NICE_EXACT', label: 'Exact Nice', emoji: '😏', family: 'NICE', score: 100000100, rarity: 'mythic', test: (d, s, n) => n === 69 },
    { id: 'EVEN', label: 'Even', emoji: '⚖️', family: null, score: 200, rarity: 'common', test: (d, s, n) => n % 2 === 0 },
    { id: 'ODD', label: 'Odd', emoji: '🦄', family: null, score: 200, rarity: 'common', test: (d, s, n) => n % 2 !== 0 },
    { id: 'CLEAN', label: 'Clean', emoji: '🧼', family: null, score: 1000, rarity: 'uncommon', test: (d) => d[5] === 0 },
    { id: 'SEMI_CLEAN', label: 'Semi-Clean', emoji: '🧹', family: null, score: 1000, rarity: 'uncommon', test: (d) => d[5] === 5 },
    { id: 'CENTURY', label: 'Century', emoji: '💯', family: null, score: 10000, rarity: 'rare', test: (d) => d[4] === 0 && d[5] === 0 },
    { id: 'MILLENNIUM', label: 'Millennium', emoji: '🗓️', family: null, score: 100000, rarity: 'epic', test: (d) => d[3] === 0 && d[4] === 0 && d[5] === 0 },
    { id: 'DOZEN', label: 'Dozen', emoji: '🍩', family: null, score: 1200, rarity: 'uncommon', test: (d, s, n) => n % 12 === 0 },
    { id: 'LUCKY_SEVEN_DIV', label: 'Lucky Seven', emoji: '🎰', family: null, score: 700, rarity: 'common', test: (d, s, n) => n % 7 === 0 },
    { id: 'ELEVEN', label: 'Eleven', emoji: '🕚', family: null, score: 1100, rarity: 'uncommon', test: (d, s, n) => n % 11 === 0 },
    { id: 'GROUNDED', label: 'Grounded', emoji: '⚓', family: null, score: 250, rarity: 'common', test: (d) => d[0] < d[5] },
    { id: 'LIFTOFF', label: 'Liftoff', emoji: '🚀', family: null, score: 200, rarity: 'common', test: (d) => d[0] > d[5] },
    { id: 'SANDWICH', label: 'Sandwich', emoji: '🥪', family: 'EQUILIBRIUM', score: 1000, rarity: 'uncommon', test: (d) => d[0] === d[5] && d.slice(1, 5).some(x => x !== d[0]) },
    { id: 'EQUILIBRIUM', label: 'Equilibrium', emoji: '🧘', family: 'EQUILIBRIUM', score: 1000, rarity: 'uncommon', test: (d) => d[0] === d[5] },
    { id: 'TURTLE', label: 'Turtle', emoji: '🐢', family: 'PROGRESSION', score: 36049, rarity: 'rare', test: (d) => d.every((v, i) => i === 0 || Math.abs(v - d[i - 1]) <= 1) },
    { id: 'CASCADE', label: 'Cascade', emoji: '🌊', family: 'PROGRESSION', score: 3333337, rarity: 'anomaly', test: (d) => d.every((v, i) => i === 0 || v === d[i - 1] + 1) },
    { id: 'WATERFALL', label: 'Waterfall', emoji: '🚿', family: 'PROGRESSION', score: 2857146, rarity: 'anomaly', test: (d) => d.every((v, i) => i === 0 || v === d[i - 1] - 1) },
    { id: 'ECHO', label: 'Echo', emoji: '📣', family: null, score: 100100, rarity: 'epic', test: (d, s) => s.slice(0, 3) === s.slice(3, 6) },
    { id: 'CONTIGUOUS_SIXES', label: 'Contiguous Sixes', emoji: '➖➖➖➖', family: 'CONTIGUOUS_RUN', score: 10000010, rarity: 'mythic', test: (d) => typeof d[0] === 'number' && d.every(v => v === d[0]) },
    { id: 'CONTIGUOUS_FIVES', label: 'Contiguous Fives', emoji: '➖➖➖', family: 'CONTIGUOUS_RUN', score: 552487, rarity: 'epic', test: (d) => maxRun(d) >= 5 },
    { id: 'CONTIGUOUS_QUADS', label: 'Contiguous Quads', emoji: '➖➖', family: 'CONTIGUOUS_RUN', score: 37023, rarity: 'rare', test: (d) => maxRun(d) >= 4 },
    { id: 'CONTIGUOUS_TRIPS', label: 'Contiguous Trips', emoji: '➖', family: 'CONTIGUOUS_RUN', score: 2784, rarity: 'uncommon', test: (d) => maxRun(d) >= 3 }
  ];

  function maxRun(d) {
    let best = 1, cur = 1;
    for (let i = 1; i < d.length; i++) {
      cur = d[i] === d[i - 1] ? cur + 1 : 1;
      best = Math.max(best, cur);
    }
    return best;
  }

  function evaluateLine(digits) {
    const s = digits.join('');
    const n = parseInt(s, 10);
    const matched = BADGES.filter(b => b.test(digits, s, n));

    const byFamily = {};
    const standalone = [];
    matched.forEach(b => {
      if (!b.family) { standalone.push(b); return; }
      if (!byFamily[b.family] || b.score > byFamily[b.family].score) byFamily[b.family] = b;
    });

    const awarded = [...standalone, ...Object.values(byFamily)];
    awarded.sort((a, b) => b.score - a.score);
    return awarded;
  }

  // 数字动画滚动且增加千位分隔符 .toLocaleString()
  function animateEPTo(targetEP) {
    cancelAnimationFrame(epAnimationframe);
    const startEP = displayedEP;
    const duration = 1200;
    const startTime = performance.now();

    function step(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const easeProgress = 1 - Math.pow(1 - progress, 4);
      
      displayedEP = Math.round(startEP + (targetEP - startEP) * easeProgress);
      document.getElementById('epScore').innerHTML = `${displayedEP.toLocaleString()}<span class="unit">EP</span>`;

      if (progress < 1) {
        epAnimationframe = requestAnimationFrame(step);
      }
    }
    epAnimationframe = requestAnimationFrame(step);
  }

  const INDICATOR_TRAVEL_MS = 450;
  const ARRIVAL_PAD_MS = 40;

  function spawnBadgeCard(badge) {
    const card = document.createElement('div');
    card.className = 'badge-card';
    const color = RARITY_COLOR[badge.rarity] || RARITY_COLOR.common;
    card.style.setProperty('--card-color', color);
    card.style.setProperty('--card-glow', color + '80');
    card.innerHTML = `
      <span class="badge-emoji">${badge.emoji}</span>
      <span class="badge-info">
        <span class="badge-label">${badge.label}</span>
        <span class="badge-meta">${badge.rarity}</span>
      </span>
      <span class="badge-ep">+${badge.score.toLocaleString()} EP</span>
    `;
    badgeCardsEl.prepend(card);
  }

  function triggerBadgeHighlight(cellIndices, awardedBadges) {
    cellIndices.forEach(idx => {
      cells[idx].classList.add('badge-trigger');
      setTimeout(() => cells[idx].classList.remove('badge-trigger'), 60);
    });

    awardedBadges.forEach(badge => {
      currentEP += badge.score;
      currentBadges += 1;
      spawnBadgeCard(badge);
    });
    animateEPTo(currentEP);
    document.getElementById('badgeCount').textContent = `${currentBadges} Badge${currentBadges === 1 ? '' : 's'} Earned`;
  }

  function getCellAt(r, c) { return cells[r * 6 + c]; }

  function moveIndicatorToCell(r, c, offsetDir = 'left', rotation = 0) {
    const cell = getCellAt(r, c);
    const indSize = 32;
    let targetX = 0, targetY = 0;

    if (offsetDir === 'left') {
      targetX = cell.offsetLeft - indSize - 12;
      targetY = cell.offsetTop + (cell.offsetHeight / 2) - (indSize / 2);
    } else if (offsetDir === 'top') {
      targetX = cell.offsetLeft + (cell.offsetWidth / 2) - (indSize / 2);
      targetY = cell.offsetTop - indSize - 12;
    } else if (offsetDir === 'diag') {
      targetX = cell.offsetLeft - indSize - 6;
      targetY = cell.offsetTop - indSize - 6;
    }

    rowIndicator.style.transform = `translate(${targetX}px, ${targetY}px) rotate(${rotation}deg)`;
  }

  function startDetectionSequence(fixedGridValues) {
    const steps = [];

    for (let r = 5; r >= 0; r--) {
      steps.push({
        action: () => moveIndicatorToCell(r, 0, 'left', 0),
        cells: [0, 1, 2, 3, 4, 5].map(c => r * 6 + c)
      });
    }

    steps.push({
      action: () => moveIndicatorToCell(0, 0, 'diag', 45),
      cells: [0, 1, 2, 3, 4, 5].map(i => i * 6 + i)
    });

    for (let c = 0; c < 6; c++) {
      steps.push({
        action: () => moveIndicatorToCell(0, c, 'top', 90),
        cells: [0, 1, 2, 3, 4, 5].map(r => r * 6 + c)
      });
    }

    let currentStep = 0;
    moveIndicatorToCell(5, 0, 'left', 0);

    setTimeout(() => {
      rowIndicator.classList.add('visible');

      detectionTimer = setInterval(() => {
        if (currentStep >= steps.length) {
          clearInterval(detectionTimer);
          return;
        }

        const step = steps[currentStep];
        step.action();

        setTimeout(() => {
          const digits = step.cells.map(idx => fixedGridValues[idx]);
          const awarded = evaluateLine(digits);
          if (awarded.length > 0) {
            triggerBadgeHighlight(step.cells, awarded);
          }
        }, INDICATOR_TRAVEL_MS + ARRIVAL_PAD_MS);

        currentStep++;
      }, 1000);
    }, 1000);
  }

  function startRun() {
    rolled = true;
    if (currentMode === 'hourly') randomizeGrid();

    const gridSnapshot = getGridValues();

    if (currentMode === 'sandbox') {
      cells.forEach((cell, idx) => {
        cell.innerHTML = gridSnapshot[idx];
      });
    }

    gridPanel.classList.add('expanded');
    defaultState.classList.add('fade-out-right');

    setTimeout(() => {
      displayedEP = 0;
      currentEP = 0;
      currentBadges = 0;
      document.getElementById('epScore').innerHTML = `0<span class="unit">EP</span>`;
      document.getElementById('badgeCount').textContent = `0 Badges Earned`;
      badgeCardsEl.innerHTML = '';

      defaultState.classList.add('hidden');
      result.classList.add('visible');

      startDetectionSequence(gridSnapshot);
    }, 550);
  }

  document.getElementById('generateBtn').addEventListener('click', startRun);
  document.getElementById('calculateBtn')?.addEventListener('click', startRun);
</script>

</body>
